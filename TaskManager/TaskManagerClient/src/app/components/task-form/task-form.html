<div class="task-form-container">
  <div class="panel-header">
    <h2>{{ isEditMode ? 'Edit Task' : 'Add New Task' }}</h2>
    <p class="subtitle">{{ isEditMode ? 'Update the task details below' : 'Fill in the details to create a task' }}</p>
  </div>

  <form (ngSubmit)="submit()" #taskForm="ngForm" class="form-body">

    <div class="alert success" *ngIf="successMessage">{{ successMessage }}</div>
    <div class="alert error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <div class="form-group">
      <label for="title">Title <span class="required">*</span></label>
      <input id="title"
             type="text"
             [(ngModel)]="title"
             name="title"
             placeholder="Enter task title"
             required
             maxlength="200" />
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description"
                [(ngModel)]="description"
                name="description"
                placeholder="Optional description..."
                rows="3"
                maxlength="500"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="dueDate">Due Date</label>
        <input id="dueDate"
               type="date"
               [(ngModel)]="dueDate"
               name="dueDate" />
      </div>

      <div class="form-group">
        <label for="priority">Priority</label>
        <select id="priority" [(ngModel)]="priority" name="priority">
          <option [value]="1">Low</option>
          <option [value]="2">Medium</option>
          <option [value]="3">High</option>
        </select>
      </div>
    </div>

    <div class="form-group checkbox-group" *ngIf="isEditMode">
      <label class="checkbox-label">
        <input type="checkbox" [(ngModel)]="isCompleted" name="isCompleted" />
        <span>Mark as completed</span>
      </label>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary" [disabled]="saving">
        {{ saving ? 'Saving...' : (isEditMode ? 'Update Task' : 'Add Task') }}
      </button>
      <button type="button" class="btn-secondary" (click)="cancel()" *ngIf="isEditMode">
        Cancel
      </button>
    </div>
  </form>
</div>
